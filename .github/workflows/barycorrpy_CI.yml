name: Tests

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .
          pip install pytest

      - name: Prime IERS-B cache
        # barycorrpy downloads the IERS-B table at import time. Pre-populate
        # astropy's download cache here (with retries) so the import during the
        # test run hits the cache instead of timing out on the network.
        run: |
          for i in 1 2 3; do
            python -c "from astropy.utils.iers import IERS_B_URL; from astropy.utils.data import download_file; download_file(IERS_B_URL, cache=True)" && break
            echo "IERS-B download attempt $i failed, retrying..."
            sleep 10
          done

      - name: Run tests
        run: pytest -v barycorrpy/tests
