name: Tests

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
        astroquery: [""]  # latest
        include:
          - python-version: "3.12"
            astroquery: "==0.4.7" # legacy version, proven to work on 3.12

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .
          pip install pytest
          pip install "astroquery${{ matrix.astroquery }}"

      - name: Show astroquery version
        run: python -c "import astroquery; print('astroquery', astroquery.__version__)"

      - name: Run tests
        run: pytest -v barycorrpy/tests
